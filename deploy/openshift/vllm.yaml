apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: vllm
          image: vllm/vllm-omni:v0.24.0
          command: ["vllm", "serve"]
          args:
            - --model=/model
            - --served-model-name=Qwen/Qwen3-Omni-30B-A3B-Instruct
            - --omni
            - --quantization
            - fp8
            - --max-model-len
            - "32768"
            - --host
            - "0.0.0.0"
            - --port
            - "8091"
            - --stage-overrides
            - '{"0": {"gpu_memory_utilization": 0.95}, "1": {"devices": "1", "gpu_memory_utilization": 0.6}, "2": {"devices": "1", "gpu_memory_utilization": 0.25}}'
          env:
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8091
              protocol: TCP
          resources:
            requests:
              nvidia.com/gpu: "2"
            limits:
              nvidia.com/gpu: "2"
          volumeMounts:
            - name: model
              mountPath: /model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 300
            periodSeconds: 10
      volumes:
        - name: model
          image:
            reference: <MODEL_IMAGE_REFERENCE>
            pullPolicy: Always
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8091
      targetPort: http
      protocol: TCP
