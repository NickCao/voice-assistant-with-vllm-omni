apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
data:
  config.yaml: |
    port: 7880
    rtc:
      tcp_port: 7881
      port_range_start: 50000
      port_range_end: 50100
      use_external_ip: false
    keys:
      devkey: secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  labels:
    app.kubernetes.io/name: livekit
    app.kubernetes.io/component: media-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: livekit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: livekit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: livekit
          image: livekit/livekit-server:latest
          args: ["--config", "/etc/livekit/config.yaml"]
          ports:
            - name: http
              containerPort: 7880
              protocol: TCP
            - name: rtc-tcp
              containerPort: 7881
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: livekit-config
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-server
spec:
  selector:
    app.kubernetes.io/name: livekit
  ports:
    - name: http
      port: 7880
      targetPort: http
      protocol: TCP
    - name: rtc-tcp
      port: 7881
      targetPort: rtc-tcp
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: livekit
  annotations:
    haproxy.router.openshift.io/timeout: 3600s
spec:
  tls:
    termination: edge
  port:
    targetPort: http
  to:
    kind: Service
    name: livekit-server
